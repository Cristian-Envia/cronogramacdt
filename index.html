<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma de Proyectos</title>
<link href="https://fonts.googleapis.com/css2?family=Asap:ital,wdth,wght@0,75..125,100..900;1,75..125,100..900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#ba0020;--red-dark:#8c0018;--red-light:#f5e0e3;--red-mid:#d4354f;
  --gray:#4e4e4e;--gray-light:#7a7a7a;--gray-lighter:#b0b0b0;
  --gray-bg:#f4f4f4;--gray-border:#e0e0e0;--white:#fff;--black:#1a1a1a;
  --font:'Asap',sans-serif;--radius:10px;--radius-sm:6px;
  --shadow:0 2px 10px rgba(0,0,0,.08);--shadow-md:0 4px 20px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#efefef;color:var(--black);font-size:14px;min-height:100vh}

/* TOP BAR */
.topbar{background:var(--red);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{color:#fff;font-size:17px;font-weight:800;letter-spacing:.4px;display:flex;align-items:center;gap:9px}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-new{background:#fff;color:var(--red);border:none;border-radius:var(--radius-sm);padding:7px 15px;font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-new:hover{background:var(--red-light)}
.sync-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:var(--radius-sm);padding:6px 12px;color:#fff;font-size:12px;font-family:var(--font);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.sync-btn:hover{background:rgba(255,255,255,.25)}

/* STATS BAR */
.stats-bar{background:var(--white);border-bottom:1px solid var(--gray-border);padding:0 24px;display:flex;overflow-x:auto}
.stat-item{padding:12px 20px;text-align:center;border-right:1px solid var(--gray-border);cursor:pointer;transition:background .15s;flex-shrink:0;min-width:100px}
.stat-item:last-child{border-right:none}
.stat-item:hover{background:var(--gray-bg)}
.stat-num{font-size:20px;font-weight:800;color:var(--gray);line-height:1}
.stat-label{font-size:10px;color:var(--gray-lighter);margin-top:3px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.stat-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* MAIN */
.main{display:flex;min-height:calc(100vh - 108px)}
.sidebar{width:240px;background:var(--white);border-right:1px solid var(--gray-border);padding:18px 16px;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 108px);position:sticky;top:108px}
.content{flex:1;padding:18px 20px;overflow:auto}

/* SIDEBAR */
.sb-section{margin-bottom:20px}
.sb-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--gray-lighter);margin-bottom:8px;display:block}
.search-wrap{position:relative}
.search-wrap input{width:100%;border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:7px 9px 7px 30px;font-size:13px;font-family:var(--font);color:var(--black);outline:none;background:var(--gray-bg)}
.search-wrap input:focus{border-color:var(--red);background:#fff}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--gray-lighter);pointer-events:none}
.filter-group,.owner-group{display:flex;flex-direction:column;gap:3px}
.fchip{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--gray);transition:all .15s;border:none;background:transparent;width:100%;text-align:left;font-family:var(--font);font-weight:500}
.fchip:hover{background:var(--gray-bg)}
.fchip.active{background:var(--red-light);color:var(--red);font-weight:700}
.fchip .cnt{margin-left:auto;background:var(--gray-bg);color:var(--gray-lighter);border-radius:20px;font-size:11px;padding:1px 7px;font-weight:700}
.fchip.active .cnt{background:var(--red);color:#fff}
.date-range{display:flex;flex-direction:column;gap:7px}
.date-field label{font-size:10px;color:var(--gray-light);display:block;margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.date-field input{width:100%;border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:6px 9px;font-size:12px;font-family:var(--font);color:var(--black);outline:none;background:var(--gray-bg)}
.date-field input:focus{border-color:var(--red);background:#fff}
.prog-filter label{font-size:11px;color:var(--gray-light);display:flex;justify-content:space-between;margin-bottom:5px}
.prog-filter input[type=range]{width:100%;accent-color:var(--red)}
.btn-clear-all{width:100%;background:transparent;border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:7px;font-size:12px;font-family:var(--font);color:var(--gray-light);cursor:pointer;margin-top:6px;font-weight:600}
.btn-clear-all:hover{border-color:var(--red);color:var(--red)}
.ava-xs{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;color:#fff}

/* VIEW HEADER */
.view-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.res-count{font-size:13px;font-weight:700;color:var(--gray)}
.view-controls{display:flex;gap:8px;align-items:center}
.sort-sel{border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:5px 9px;font-size:12px;font-family:var(--font);color:var(--gray);background:var(--white);outline:none;cursor:pointer;font-weight:600}
.sort-sel:focus{border-color:var(--red)}
.view-toggle{display:flex;background:var(--white);border:1px solid var(--gray-border);border-radius:var(--radius-sm);overflow:hidden}
.vbtn{padding:5px 11px;border:none;background:transparent;font-family:var(--font);font-size:12px;font-weight:700;color:var(--gray-light);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.vbtn.active{background:var(--red);color:#fff}

/* PROJECT CARD */
.pcard{background:var(--white);border:1px solid var(--gray-border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:box-shadow .2s;box-shadow:var(--shadow)}
.pcard:hover{box-shadow:var(--shadow-md)}
.pcard.overdue{border-left:3px solid var(--red)}
.phdr{padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .15s}
.phdr:hover{background:#fafafa}
.pexp{color:var(--gray-lighter);transition:transform .2s;flex-shrink:0}
.pexp.open{transform:rotate(90deg)}
.pmeta{flex:1;min-width:0}
.pname{font-size:15px;font-weight:800;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.pdates{font-size:11px;color:var(--gray-light);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pdates span{display:flex;align-items:center;gap:3px}
.overdue-tag{color:var(--red);font-weight:800}
.pright{display:flex;align-items:center;gap:9px;flex-shrink:0}
.sbadge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.s-activo{background:#e8f4fd;color:#0972b8}
.s-pausado{background:#fff3e0;color:#b06000}
.s-completado{background:#e6f4ea;color:#1e7e34}
.s-riesgo{background:var(--red-light);color:var(--red)}
.s-pendiente{background:#f1f3f4;color:#5f6368}
.ava-sm{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:#fff}
.prog-col{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:68px}
.prog-track{width:68px;height:4px;background:var(--gray-bg);border-radius:3px;overflow:hidden}
.prog-fill{height:4px;border-radius:3px;background:var(--red);transition:width .4s}
.prog-fill.hi{background:#1e7e34}
.prog-fill.mid{background:#b06000}
.pct{font-size:11px;font-weight:800;color:var(--gray)}
.btn-edit-sm{background:transparent;border:none;cursor:pointer;color:var(--gray-lighter);padding:4px;border-radius:4px;transition:all .15s}
.btn-edit-sm:hover{background:var(--red-light);color:var(--red)}

/* PROJECT BODY */
.pbody{border-top:1px solid var(--gray-border);display:none}
.pbody.open{display:block}
.sub-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;background:var(--gray-bg);border-bottom:1px solid var(--gray-border)}
.sub-tl-label{font-size:11px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.btn-add-sub{background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:5px 11px;font-size:12px;font-weight:800;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-add-sub:hover{background:var(--red-dark)}
.sub-tbl{width:100%;border-collapse:collapse}
.sub-tbl th{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-lighter);padding:7px 15px;text-align:left;background:var(--gray-bg);border-bottom:1px solid var(--gray-border)}
.sub-tbl td{padding:9px 15px;font-size:13px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.sub-tbl tr:last-child td{border-bottom:none}
.sub-tbl tr:hover td{background:#fafafa}
.sub-name-c{font-weight:700;color:var(--black)}
.sub-date-c{color:var(--gray-light);font-size:12px}
.sub-overdue{color:var(--red);font-weight:800}
.btn-ico{background:transparent;border:none;cursor:pointer;color:var(--gray-lighter);padding:3px;border-radius:4px;transition:all .15s}
.btn-ico:hover{background:var(--red-light);color:var(--red)}
.notes-block{padding:11px 15px;background:#fffaf7;border-top:1px solid var(--gray-border)}
.notes-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-lighter);margin-bottom:5px}
.notes-txt{font-size:13px;color:var(--gray);line-height:1.6;white-space:pre-wrap}

/* CALENDAR */
.cal-wrap{background:var(--white);border:1px solid var(--gray-border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.cal-hdr{background:var(--red);color:#fff;padding:13px 18px;display:flex;align-items:center;justify-content:space-between}
.cal-month-lbl{font-size:16px;font-weight:800}
.cal-nav{display:flex;gap:5px}
.cal-nav button{background:rgba(255,255,255,.2);border:none;border-radius:var(--radius-sm);cursor:pointer;color:#fff;font-family:var(--font);font-weight:700}
.cal-nav .nav-arrow{width:28px;height:28px;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav .nav-today{padding:0 10px;height:28px;font-size:11px}
.cal-nav button:hover{background:rgba(255,255,255,.35)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dh{padding:7px 4px;text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-lighter);border-bottom:1px solid var(--gray-border)}
.cal-cell{min-height:88px;padding:5px;border-right:1px solid var(--gray-border);border-bottom:1px solid var(--gray-border)}
.cal-cell:nth-child(7n){border-right:none}
.cal-dn{font-size:12px;font-weight:700;color:var(--gray);margin-bottom:3px;line-height:1}
.cal-cell.today .cal-dn{background:var(--red);color:#fff;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-cell.other-m .cal-dn{color:var(--gray-lighter)}
.cal-ev{font-size:10px;font-weight:700;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.cal-ev.s-activo{background:#e8f4fd;color:#0972b8}
.cal-ev.s-completado{background:#e6f4ea;color:#1e7e34}
.cal-ev.s-riesgo{background:var(--red-light);color:var(--red)}
.cal-ev.s-pausado{background:#fff3e0;color:#b06000}
.cal-ev.s-pendiente{background:#f1f3f4;color:#5f6368}

/* KANBAN */
.kanban-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start}
.kb-col{background:var(--gray-bg);border-radius:var(--radius);overflow:hidden}
.kb-col-hdr{padding:11px 13px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid transparent}
.kb-col-hdr.h-activo{border-color:#0972b8;color:#0972b8}
.kb-col-hdr.h-pausado{border-color:#b06000;color:#b06000}
.kb-col-hdr.h-riesgo{border-color:var(--red);color:var(--red)}
.kb-col-hdr.h-completado{border-color:#1e7e34;color:#1e7e34}
.kb-col-hdr.h-pendiente{border-color:#5f6368;color:#5f6368}
.kb-cnt{background:var(--white);border-radius:20px;padding:1px 7px;font-size:11px;font-weight:800}
.kb-body{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:120px}
.kb-card{background:var(--white);border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:9px;cursor:pointer;transition:box-shadow .15s}
.kb-card:hover{box-shadow:var(--shadow)}
.kb-name{font-size:13px;font-weight:800;margin-bottom:5px;line-height:1.3}
.kb-meta{font-size:11px;color:var(--gray-light);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.kb-prog{height:3px;background:var(--gray-bg);border-radius:2px;margin-top:7px;overflow:hidden}
.kb-prog-fill{height:3px;border-radius:2px;background:var(--red)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius);width:500px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.28)}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-ttl{font-size:16px;font-weight:800;color:var(--black)}
.modal-x{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--gray-lighter);line-height:1;padding:0}
.modal-x:hover{color:var(--gray)}
.modal-bdy{padding:18px 22px}
.modal-ftr{padding:14px 22px;border-top:1px solid var(--gray-border);display:flex;gap:7px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.field-row.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-family:var(--font);color:var(--black);outline:none;background:var(--white);transition:border-color .15s;font-weight:500}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red)}
.field textarea{resize:vertical;min-height:65px;line-height:1.5}
.prog-wrap{display:flex;align-items:center;gap:9px}
.prog-wrap input[type=range]{flex:1;accent-color:var(--red)}
.prog-wrap span{font-size:13px;font-weight:800;color:var(--red);min-width:34px}
.btn-cancel{background:transparent;border:1px solid var(--gray-border);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;color:var(--gray);transition:all .15s}
.btn-cancel:hover{border-color:var(--gray)}
.btn-save{background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 20px;font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all .15s}
.btn-save:hover{background:var(--red-dark)}
.btn-del{background:var(--red-light);color:var(--red);border:1px solid var(--red-light);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;margin-right:auto;transition:all .15s}
.btn-del:hover{background:var(--red);color:#fff}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--gray);color:#fff;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;z-index:9999;display:none;align-items:center;gap:7px;box-shadow:var(--shadow-md)}
.toast.show{display:flex}
.toast.success{background:#1e7e34}
.toast.error{background:var(--red)}

/* EMPTY / LOADING */
.empty-st{text-align:center;padding:36px 16px;color:var(--gray-lighter)}
.empty-st p{font-size:14px;font-weight:700;margin-top:8px}
.loading-st{text-align:center;padding:36px;color:var(--gray-lighter);font-size:14px;font-weight:600}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--gray-border);border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite;margin-right:7px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:860px){.kanban-wrap{grid-template-columns:1fr 1fr}}
@media(max-width:600px){
  .main{flex-direction:column}
  .sidebar{width:100%;max-height:none;position:static;padding:12px}
  .content{padding:12px}
  .field-row{grid-template-columns:1fr}
  .sub-tbl th:nth-child(3),.sub-tbl td:nth-child(3){display:none}
}
</style>
</head>
<body>

<!-- ⚠️ REEMPLAZA CON TU URL DE APPS SCRIPT -->
<script>const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxlfXFOEqBTEoLXxjrZHABJinUZchy9XaUfIzqnQ3QccJipPPZmRjP0DWr40GLuWeL3/exec';</script>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2" fill="rgba(255,255,255,.9)"/><rect x="14" y="3" width="7" height="7" rx="2" fill="rgba(255,255,255,.9)"/><rect x="3" y="14" width="7" height="7" rx="2" fill="rgba(255,255,255,.6)"/><rect x="14" y="14" width="7" height="7" rx="2" fill="rgba(255,255,255,.9)"/></svg>
    Cronograma de Proyectos
  </div>
  <div class="topbar-right">
    <button class="sync-btn" id="sync-btn" onclick="syncData()">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path stroke="#fff" stroke-width="2" stroke-linecap="round" d="M4 12a8 8 0 0 1 14-5.3M20 12a8 8 0 0 1-14 5.3"/><path stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M18 7l2-2-2-2M6 17l-2 2 2 2"/></svg>
      Sincronizar
    </button>
    <button class="btn-new" onclick="openPModal()">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path stroke="#ba0020" stroke-width="2.5" stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
      Nuevo proyecto
    </button>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="stats-bar"></div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-section">
      <span class="sb-label">Buscar</span>
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="#b0b0b0" stroke-width="2"/><path stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" d="M17 17l3 3"/></svg>
        <input type="text" id="search-inp" placeholder="Proyecto o responsable…" oninput="applyFilters()">
      </div>
    </div>

    <div class="sb-section">
      <span class="sb-label">Estado</span>
      <div class="filter-group" id="status-filters">
        <button class="fchip active" data-st="todos" onclick="setStFilter('todos',this)"><span class="stat-dot" style="background:#4e4e4e"></span>Todos<span class="cnt" id="c-todos">0</span></button>
        <button class="fchip" data-st="activo" onclick="setStFilter('activo',this)"><span class="stat-dot" style="background:#0972b8"></span>Activo<span class="cnt" id="c-activo">0</span></button>
        <button class="fchip" data-st="riesgo" onclick="setStFilter('riesgo',this)"><span class="stat-dot" style="background:#ba0020"></span>En riesgo<span class="cnt" id="c-riesgo">0</span></button>
        <button class="fchip" data-st="pausado" onclick="setStFilter('pausado',this)"><span class="stat-dot" style="background:#b06000"></span>Pausado<span class="cnt" id="c-pausado">0</span></button>
        <button class="fchip" data-st="completado" onclick="setStFilter('completado',this)"><span class="stat-dot" style="background:#1e7e34"></span>Completado<span class="cnt" id="c-completado">0</span></button>
        <button class="fchip" data-st="pendiente" onclick="setStFilter('pendiente',this)"><span class="stat-dot" style="background:#9aa0a6"></span>Pendiente<span class="cnt" id="c-pendiente">0</span></button>
      </div>
    </div>

    <div class="sb-section">
      <span class="sb-label">Rango de fechas</span>
      <div class="date-range">
        <div class="date-field"><label>Desde</label><input type="date" id="df" onchange="applyFilters()"></div>
        <div class="date-field"><label>Hasta</label><input type="date" id="dt" onchange="applyFilters()"></div>
      </div>
    </div>

    <div class="sb-section">
      <span class="sb-label">Responsable</span>
      <div class="owner-group" id="owner-filters"></div>
    </div>

    <div class="sb-section">
      <span class="sb-label">Progreso mínimo</span>

    <button class="btn-clear-all" onclick="clearFilters()">✕ Limpiar filtros</button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="view-hdr">
      <span class="res-count" id="res-count">Cargando…</span>
      <div class="view-controls">
        <select class="sort-sel" id="sort-sel" onchange="applyFilters()">
          <option value="name">Nombre A–Z</option>
          <option value="prog-desc">Mayor progreso</option>
          <option value="prog-asc">Menor progreso</option>
          <option value="end-asc">Fecha límite próxima</option>
          <option value="status">Estado</option>
        </select>
        <div class="view-toggle">
          <button class="vbtn active" id="vb-list" onclick="setView('list')">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M3 6h18M3 12h18M3 18h18"/></svg>Lista
          </button>
          <button class="vbtn" id="vb-calendar" onclick="setView('calendar')">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M8 2v4M16 2v4M3 10h18"/></svg>Calendario
          </button>
          <button class="vbtn" id="vb-kanban" onclick="setView('kanban')">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18" rx="1" stroke="currentColor" stroke-width="2"/><rect x="10" y="3" width="5" height="12" rx="1" stroke="currentColor" stroke-width="2"/><rect x="17" y="3" width="5" height="15" rx="1" stroke="currentColor" stroke-width="2"/></svg>Kanban
          </button>
        </div>
      </div>
    </div>
    <div id="proj-container"><div class="loading-st"><span class="spinner"></span>Conectando con Google Sheets…</div></div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="pm">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-ttl" id="pm-ttl">Nuevo proyecto</span><button class="modal-x" onclick="closeM('pm')">✕</button></div>

        <div class="field"><label>Responsable *</label><input id="p-owner" type="text" placeholder="Nombre del responsable"></div>

      <div class="field-row full"><div class="field"><label>Progreso (%)</label><div class="prog-wrap"><input type="range" id="p-prog" min="0" max="100" value="0" step="5" oninput="document.getElementById('p-pct').textContent=this.value+'%'"><span id="p-pct">0%</span></div></div></div>
      <div class="field-row full"><div class="field"><label>Notas / Descripción</label><textarea id="p-notes" placeholder="Agrega una descripción, contexto o notas del proyecto…"></textarea></div></div>
    </div>
    <div class="modal-ftr"><button class="btn-del" id="pm-del" onclick="delProject()" style="display:none">Eliminar</button><button class="btn-cancel" onclick="closeM('pm')">Cancelar</button><button class="btn-save" onclick="saveProject()">Guardar proyecto</button></div>
  </div>
</div>

<!-- SUB MODAL -->
<div class="modal-overlay" id="sm">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-ttl" id="sm-ttl">Nueva subactividad</span><button class="modal-x" onclick="closeM('sm')">✕</button></div>
    <div class="modal-bdy">
      <div class="field-row full"><div class="field"><label>Nombre de la subactividad *</label><input id="s-name" type="text" placeholder="Ej: Diseño de wireframes"></div></div>
      <div class="field-row">
        <div class="field"><label>Responsable *</label><input id="s-owner" type="text" placeholder="Nombre"></div>
        <div class="field"><label>Estado</label><select id="s-status"><option value="pendiente">Pendiente</option><option value="activo">En progreso</option><option value="completado">Completado</option><option value="pausado">Pausado</option><option value="riesgo">En riesgo</option></select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Fecha inicio</label><input id="s-start" type="date"></div>
        <div class="field"><label>Fecha límite</label><input id="s-end" type="date"></div>
      </div>
      <div class="field-row full"><div class="field"><label>Notas</label><textarea id="s-notes" placeholder="Detalles de la subactividad…"></textarea></div></div>
    </div>
    <div class="modal-ftr"><button class="btn-del" id="sm-del" onclick="delSub()" style="display:none">Eliminar</button><button class="btn-cancel" onclick="closeM('sm')">Cancelar</button><button class="btn-save" onclick="saveSub()">Guardar</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────
let proyectos=[],subs=[];
let stFilter='todos',ownerFilter='todos',curView='list';
let editPId=null,editSIdx=null,editSPId=null;
const today=new Date();
let calY=today.getFullYear(),calM=today.getMonth();
const COLORS=['#ba0020','#0972b8','#1e7e34','#b06000','#7b3fa0','#1a7a7a','#c05000','#a0522d'];
const oCM={};let cI=0;
function gColor(n){if(!oCM[n])oCM[n]=COLORS[cI++%COLORS.length];return oCM[n];}
function ini(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function fDate(d){if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'});}
function isOD(d,st){if(!d||st==='completado')return false;return new Date(d+'T23:59:59')<today;}
const SL={activo:'Activo',pausado:'Pausado',completado:'Completado',riesgo:'En riesgo',pendiente:'Pendiente'};
const SC={activo:'s-activo',pausado:'s-pausado',completado:'s-completado',riesgo:'s-riesgo',pendiente:'s-pendiente'};

// ── LOAD ───────────────────────────────────────────────────
async function loadData(){
  if(APPS_SCRIPT_URL==='TU_URL_APPS_SCRIPT_AQUI'){
    proyectos=[
      {id:1,name:'Rediseño sitio web corporativo',status:'activo',owner:'Ana García',progress:65,start:'2024-03-01',end:'2025-06-15',notes:'Proyecto prioritario para Q2. Coordinado con equipo de desarrollo externo.'},
      {id:2,name:'Campaña marketing Q2',status:'riesgo',owner:'María Torres',progress:30,start:'2024-04-01',end:'2024-04-30',notes:'Retraso en aprobación de piezas. Requiere atención urgente del área creativa.'},
      {id:3,name:'Implementación CRM',status:'pausado',owner:'Jorge Díaz',progress:45,start:'2024-02-15',end:'2025-07-01',notes:'En espera de definición de procesos internos por parte de la dirección.'},
      {id:4,name:'Auditoría financiera anual',status:'completado',owner:'Sandra Ríos',progress:100,start:'2024-01-10',end:'2024-03-20',notes:'Finalizado sin observaciones. Informe entregado a directivos.'},
      {id:5,name:'Lanzamiento app mobile',status:'activo',owner:'Carlos López',progress:55,start:'2024-03-15',end:'2025-07-30',notes:'Desarrollo en curso. Sprint 4 en progreso. iOS y Android simultáneos.'},
    ];
    subs=[
      {projectId:1,name:'Wireframes y prototipo',owner:'Ana García',start:'2024-03-01',end:'2024-04-15',status:'completado',notes:''},
      {projectId:1,name:'Diseño visual UI',owner:'Carlos López',start:'2024-04-01',end:'2025-04-30',status:'activo',notes:'En revisión con cliente'},
      {projectId:1,name:'Desarrollo frontend',owner:'Luis Mora',start:'2024-05-01',end:'2025-06-01',status:'pendiente',notes:''},
      {projectId:1,name:'QA y pruebas',owner:'Ana García',start:'2025-06-01',end:'2025-06-15',status:'pendiente',notes:''},
      {projectId:2,name:'Brief creativo',owner:'María Torres',start:'2024-04-01',end:'2024-04-10',status:'completado',notes:''},
      {projectId:2,name:'Piezas gráficas',owner:'Pedro Ruiz',start:'2024-04-10',end:'2024-04-18',status:'riesgo',notes:'Proveedor con retrasos'},
      {projectId:3,name:'Migración de datos',owner:'Jorge Díaz',start:'2024-05-01',end:'2025-06-01',status:'pausado',notes:''},
      {projectId:5,name:'Diseño UX',owner:'Ana García',start:'2024-03-15',end:'2024-04-15',status:'completado',notes:''},
      {projectId:5,name:'Desarrollo iOS',owner:'Carlos López',start:'2024-04-16',end:'2025-06-30',status:'activo',notes:''},
      {projectId:5,name:'Desarrollo Android',owner:'Luis Mora',start:'2024-04-16',end:'2025-07-15',status:'activo',notes:''},
    ];
    renderAll();return;
  }
  try{
    const r=await fetch(APPS_SCRIPT_URL+'?action=getAll');
    const d=await r.json();
    proyectos=d.proyectos||[];subs=d.subs||[];renderAll();
  }catch(e){
    document.getElementById('proj-container').innerHTML='<div class="empty-st"><p>No se pudo conectar con Google Sheets. Verifica la URL del Apps Script.</p></div>';
  }
}

// ── RENDER ALL ─────────────────────────────────────────────
function renderAll(){updateCounts();renderOwners();renderStats();applyFilters();}

function updateCounts(){
  ['todos','activo','riesgo','pausado','completado','pendiente'].forEach(s=>{
    const el=document.getElementById('c-'+s);
    if(el)el.textContent=s==='todos'?proyectos.length:proyectos.filter(p=>p.status===s).length;
  });
}

function renderOwners(){
  const owners=[...new Set(proyectos.map(p=>p.owner))].sort();
  const c=document.getElementById('owner-filters');
  c.innerHTML=`<button class="fchip active" data-ow="todos" onclick="setOwFilter('todos',this)">Todos</button>`;
  owners.forEach(o=>{
    c.innerHTML+=`<button class="fchip" data-ow="${o}" onclick="setOwFilter('${o.replace(/'/g,"\\'")}',this)"><div class="ava-xs" style="background:${gColor(o)}">${ini(o)}</div>${o}</button>`;
  });
}

function renderStats(){
  const tot=proyectos.length;
  const act=proyectos.filter(p=>p.status==='activo').length;
  const rsk=proyectos.filter(p=>p.status==='riesgo').length;
  const comp=proyectos.filter(p=>p.status==='completado').length;
  const avg=tot?Math.round(proyectos.reduce((a,p)=>a+Number(p.progress||0),0)/tot):0;
  const od=proyectos.filter(p=>isOD(p.end,p.status)).length;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-item"><div class="stat-num">${tot}</div><div class="stat-label">Total</div></div>
    <div class="stat-item"><div class="stat-num" style="color:#0972b8">${act}</div><div class="stat-label"><span class="stat-dot" style="background:#0972b8"></span>Activos</div></div>
    <div class="stat-item"><div class="stat-num" style="color:#ba0020">${rsk}</div><div class="stat-label"><span class="stat-dot" style="background:#ba0020"></span>En riesgo</div></div>
    <div class="stat-item"><div class="stat-num" style="color:#1e7e34">${comp}</div><div class="stat-label"><span class="stat-dot" style="background:#1e7e34"></span>Completados</div></div>
    <div class="stat-item"><div class="stat-num">${avg}%</div><div class="stat-label">Progreso prom.</div></div>
    <div class="stat-item"><div class="stat-num" style="color:${od?'#ba0020':'#4e4e4e'}">${od}</div><div class="stat-label">Vencidos</div></div>`;
}

// ── FILTERS ────────────────────────────────────────────────
function setStFilter(s,btn){stFilter=s;document.querySelectorAll('.fchip[data-st]').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');applyFilters();}
function setOwFilter(o,btn){ownerFilter=o;document.querySelectorAll('.fchip[data-ow]').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');applyFilters();}
function clearFilters(){
  stFilter='todos';ownerFilter='todos';
  document.getElementById('search-inp').value='';
  document.getElementById('df').value='';document.getElementById('dt').value='';
  document.getElementById('pmin').value=0;document.getElementById('pmin-val').textContent='0';
  document.querySelectorAll('.fchip[data-st]').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-st="todos"]').classList.add('active');
  document.querySelectorAll('.fchip[data-ow]').forEach(b=>b.classList.remove('active'));
  const aw=document.querySelector('[data-ow="todos"]');if(aw)aw.classList.add('active');
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('search-inp').value.toLowerCase();
  const df=document.getElementById('df').value;
  const dt=document.getElementById('dt').value;
  const pm=parseInt(document.getElementById('pmin').value)||0;
  const sort=document.getElementById('sort-sel').value;

  let f=proyectos.filter(p=>{
    if(stFilter!=='todos'&&p.status!==stFilter)return false;
    if(ownerFilter!=='todos'&&p.owner!==ownerFilter)return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.owner.toLowerCase().includes(q))return false;
    if(df&&p.end&&p.end<df)return false;
    if(dt&&p.start&&p.start>dt)return false;
    if(Number(p.progress||0)<pm)return false;
    return true;
  });

  f.sort((a,b)=>{
    if(sort==='name')return a.name.localeCompare(b.name);
    if(sort==='prog-desc')return(b.progress||0)-(a.progress||0);
    if(sort==='prog-asc')return(a.progress||0)-(b.progress||0);
    if(sort==='end-asc'){if(!a.end)return 1;if(!b.end)return -1;return a.end.localeCompare(b.end);}
    if(sort==='status')return a.status.localeCompare(b.status);
    return 0;
  });

  document.getElementById('res-count').textContent=`${f.length} proyecto${f.length!==1?'s':''} encontrado${f.length!==1?'s':''}`;
  if(curView==='list')renderList(f);
  else if(curView==='calendar')renderCalendar();
  else renderKanban(f);
}

// ── LIST VIEW ──────────────────────────────────────────────
function renderList(f){
  const c=document.getElementById('proj-container');
  if(!f.length){c.innerHTML='<div class="empty-st"><svg width="44" height="44" fill="none" viewBox="0 0 24 24"><path stroke="#ccc" stroke-width="1.5" d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg><p>No hay proyectos con estos filtros</p></div>';return;}
  c.innerHTML=f.map(p=>{
    const ps=subs.filter(s=>s.projectId==p.id);
    const col=gColor(p.owner);
    const od=isOD(p.end,p.status);
    const pct=Number(p.progress||0);
    const fc=pct>=80?'hi':pct>=40?'mid':'';
    return `<div class="pcard${od?' overdue':''}">
      <div class="phdr" onclick="toggleP(${p.id})">
        <div class="ava-sm" style="background:${col}">${ini(p.owner)}</div>
        <div class="pmeta">
          <div class="pname">${p.name}</div>
          <div class="pdates">
            <span><svg width="10" height="10" fill="none" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path stroke="currentColor" stroke-width="2" d="M8 2v4M16 2v4M3 10h18"/></svg>${p.start?fDate(p.start):'Sin inicio'}</span>
            <span>→</span>
            <span class="${od?'overdue-tag':''}">${p.end?fDate(p.end):'Sin fecha límite'}${od?' ⚠ Vencido':''}</span>
            <span style="color:#d0d0d0">·</span>
            <span>${p.owner}</span>
            <span style="color:#d0d0d0">·</span>
            <span>${ps.length} subactividad${ps.length!==1?'es':''}</span>
          </div>
        </div>
        <div class="pright">
          <span class="sbadge ${SC[p.status]||'s-pendiente'}">${SL[p.status]||p.status}</span>
          <div class="prog-col">
            <div class="prog-track"><div class="prog-fill ${fc}" style="width:${pct}%"></div></div>
            <span class="pct">${pct}%</span>
          </div>
          <button class="btn-edit-sm" title="Editar" onclick="event.stopPropagation();editP(${p.id})"><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <svg class="pexp" id="ex-${p.id}" width="13" height="13" fill="none" viewBox="0 0 24 24"><path stroke="#b0b0b0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
      <div class="pbody" id="pb-${p.id}">
        <div class="sub-toolbar">
          <span class="sub-tl-label">Subactividades (${ps.length})</span>
          <button class="btn-add-sub" onclick="openSModal(${p.id})">+ Agregar</button>
        </div>
        ${ps.length?`<table class="sub-tbl">
          <thead><tr><th>Subactividad</th><th>Responsable</th><th>Inicio</th><th>Fecha límite</th><th>Estado</th><th></th></tr></thead>
          <tbody>${ps.map((s,i)=>{
            const sOD=isOD(s.end,s.status);
            return`<tr>
              <td class="sub-name-c">${s.name}</td>
              <td><div style="display:flex;align-items:center;gap:6px"><div class="ava-xs" style="background:${gColor(s.owner)}">${ini(s.owner)}</div><span style="color:#4e4e4e">${s.owner}</span></div></td>
              <td class="sub-date-c">${s.start?fDate(s.start):'—'}</td>
              <td class="sub-date-c ${sOD?'sub-overdue':''}">${s.end?fDate(s.end)+(sOD?' ⚠':''):'—'}</td>
              <td><span class="sbadge ${SC[s.status]||'s-pendiente'}">${SL[s.status]||s.status}</span></td>
              <td><button class="btn-ico" title="Editar" onclick="editS(${p.id},${i})"><svg width="13" height="13" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button></td>
            </tr>`;}).join('')}</tbody></table>`
          :'<div style="padding:12px 15px;font-size:13px;color:#b0b0b0;font-style:italic">Sin subactividades aún.</div>'}
        ${p.notes?`<div class="notes-block"><div class="notes-lbl">Notas</div><div class="notes-txt">${p.notes}</div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleP(id){
  const b=document.getElementById('pb-'+id);
  const e=document.getElementById('ex-'+id);
  if(b){b.classList.toggle('open');e.classList.toggle('open');}
}

// ── CALENDAR VIEW ──────────────────────────────────────────
function setView(v){
  curView=v;
  ['list','calendar','kanban'].forEach(x=>document.getElementById('vb-'+x).classList.toggle('active',x===v));
  applyFilters();
}

function renderCalendar(){
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const pd=new Date(calY,calM,0).getDate();
  const todStr=today.toISOString().split('T')[0];

  let cells='';
  for(let i=fd-1;i>=0;i--)cells+=`<div class="cal-cell other-m"><div class="cal-dn">${pd-i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===todStr;
    const evs=[
      ...proyectos.filter(p=>p.end===ds).map(p=>`<div class="cal-ev ${SC[p.status]||''}" title="${p.name}">${p.name}</div>`),
      ...subs.filter(s=>s.end===ds).map(s=>`<div class="cal-ev ${SC[s.status]||'s-pendiente'}" title="${s.name}">↳ ${s.name}</div>`)
    ].join('');
    cells+=`<div class="cal-cell${isT?' today':''}"><div class="cal-dn">${d}</div>${evs}</div>`;
  }
  const total=Math.ceil((fd+dim)/7)*7;
  let nx=1;
  for(let i=fd+dim;i<total;i++)cells+=`<div class="cal-cell other-m"><div class="cal-dn">${nx++}</div></div>`;

  document.getElementById('proj-container').innerHTML=`
    <div class="cal-wrap">
      <div class="cal-hdr">
        <span class="cal-month-lbl">${MN[calM]} ${calY}</span>
        <div class="cal-nav">
          <button class="nav-arrow" onclick="calNav(-1)">‹</button>
          <button class="nav-today" onclick="calNav(0)">Hoy</button>
          <button class="nav-arrow" onclick="calNav(1)">›</button>
        </div>
      </div>
      <div class="cal-grid">
        ${DN.map(d=>`<div class="cal-dh">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>`;
}

function calNav(d){
  if(d===0){calY=today.getFullYear();calM=today.getMonth();}
  else{calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}}
  renderCalendar();
}

// ── KANBAN VIEW ────────────────────────────────────────────
function renderKanban(f){
  const cols=[
    {k:'activo',l:'Activo',h:'h-activo'},
    {k:'riesgo',l:'En riesgo',h:'h-riesgo'},
    {k:'pausado',l:'Pausado',h:'h-pausado'},
    {k:'pendiente',l:'Pendiente',h:'h-pendiente'},
    {k:'completado',l:'Completado',h:'h-completado'},
  ];
  document.getElementById('proj-container').innerHTML=`<div class="kanban-wrap">${
    cols.map(col=>{
      const items=f.filter(p=>p.status===col.k);
      return `<div class="kb-col">
        <div class="kb-col-hdr ${col.h}">${col.l}<span class="kb-cnt">${items.length}</span></div>
        <div class="kb-body">${items.length?items.map(p=>`
          <div class="kb-card" onclick="editP(${p.id})">
            <div class="kb-name">${p.name}</div>
            <div class="kb-meta">
              <div style="display:flex;align-items:center;gap:5px"><div class="ava-xs" style="background:${gColor(p.owner)}">${ini(p.owner)}</div>${p.owner.split(' ')[0]}</div>
              <span>${p.end?fDate(p.end):'Sin fecha'}</span>
            </div>
            <div class="kb-prog"><div class="kb-prog-fill" style="width:${p.progress||0}%"></div></div>
          </div>`).join(''):'<div style="padding:8px;font-size:12px;color:#b0b0b0;font-style:italic;text-align:center">Sin proyectos</div>'}
        </div>
      </div>`;
    }).join('')
  }</div>`;
}

// ── PROJECT MODAL ─────────────────────────────────────────
function openPModal(){
  editPId=null;
  document.getElementById('pm-ttl').textContent='Nuevo proyecto';
  document.getElementById('p-name').value='';document.getElementById('p-owner').value='';
  document.getElementById('p-status').value='activo';document.getElementById('p-start').value='';
  document.getElementById('p-end').value='';document.getElementById('p-prog').value=0;
  document.getElementById('p-pct').textContent='0%';document.getElementById('p-notes').value='';
  document.getElementById('pm-del').style.display='none';
  document.getElementById('pm').classList.add('open');
}
function editP(id){
  const p=proyectos.find(x=>x.id==id);if(!p)return;
  editPId=id;
  document.getElementById('pm-ttl').textContent='Editar proyecto';
  document.getElementById('p-name').value=p.name;document.getElementById('p-owner').value=p.owner;
  document.getElementById('p-status').value=p.status;document.getElementById('p-start').value=p.start||'';
  document.getElementById('p-end').value=p.end||'';document.getElementById('p-prog').value=p.progress||0;
  document.getElementById('p-pct').textContent=(p.progress||0)+'%';document.getElementById('p-notes').value=p.notes||'';
  document.getElementById('pm-del').style.display='block';
  document.getElementById('pm').classList.add('open');
}
async function saveProject(){
  const name=document.getElementById('p-name').value.trim();
  const owner=document.getElementById('p-owner').value.trim();
  if(!name||!owner){showToast('Completa nombre y responsable','error');return;}
  const data={name,owner,status:document.getElementById('p-status').value,start:document.getElementById('p-start').value,end:document.getElementById('p-end').value,progress:parseInt(document.getElementById('p-prog').value)||0,notes:document.getElementById('p-notes').value};
  if(editPId){
    const i=proyectos.findIndex(p=>p.id==editPId);
    proyectos[i]={...proyectos[i],...data};
    await push('updateProject',{...data,id:editPId});
    showToast('Proyecto actualizado','success');
  }else{
    data.id=Date.now();proyectos.push(data);
    await push('saveProject',data);
    showToast('Proyecto creado','success');
  }
  closeM('pm');renderAll();
}
async function delProject(){
  if(!confirm('¿Eliminar este proyecto y todas sus subactividades?'))return;
  proyectos=proyectos.filter(p=>p.id!=editPId);
  subs=subs.filter(s=>s.projectId!=editPId);
  await push('deleteProject',{id:editPId});
  closeM('pm');showToast('Proyecto eliminado');renderAll();
}

// ── SUB MODAL ─────────────────────────────────────────────
function openSModal(pid){
  editSPId=pid;editSIdx=null;
  const p=proyectos.find(x=>x.id==pid);
  document.getElementById('sm-ttl').textContent=`Nueva subactividad — ${p?p.name:''}`;
  document.getElementById('s-name').value='';document.getElementById('s-owner').value='';
  document.getElementById('s-status').value='pendiente';document.getElementById('s-start').value='';
  document.getElementById('s-end').value='';document.getElementById('s-notes').value='';
  document.getElementById('sm-del').style.display='none';
  document.getElementById('sm').classList.add('open');
}
function editS(pid,idx){
  const ps=subs.filter(s=>s.projectId==pid);
  const s=ps[idx];if(!s)return;
  editSPId=pid;editSIdx=subs.indexOf(s);
  const p=proyectos.find(x=>x.id==pid);
  document.getElementById('sm-ttl').textContent=`Editar subactividad — ${p?p.name:''}`;
  document.getElementById('s-name').value=s.name;document.getElementById('s-owner').value=s.owner;
  document.getElementById('s-status').value=s.status;document.getElementById('s-start').value=s.start||'';
  document.getElementById('s-end').value=s.end||'';document.getElementById('s-notes').value=s.notes||'';
  document.getElementById('sm-del').style.display='block';
  document.getElementById('sm').classList.add('open');
}
async function saveSub(){
  const name=document.getElementById('s-name').value.trim();
  const owner=document.getElementById('s-owner').value.trim();
  if(!name||!owner){showToast('Completa nombre y responsable','error');return;}
  const data={projectId:editSPId,name,owner,status:document.getElementById('s-status').value,start:document.getElementById('s-start').value,end:document.getElementById('s-end').value,notes:document.getElementById('s-notes').value};
  if(editSIdx!==null){
    subs[editSIdx]={...subs[editSIdx],...data};
    await push('updateSub',data);showToast('Subactividad actualizada','success');
  }else{
    subs.push(data);await push('saveSub',data);showToast('Subactividad creada','success');
  }
  closeM('sm');applyFilters();
}
async function delSub(){
  if(!confirm('¿Eliminar esta subactividad?'))return;
  subs.splice(editSIdx,1);
  closeM('sm');showToast('Subactividad eliminada');applyFilters();
}

// ── SHEETS SYNC ───────────────────────────────────────────
async function push(action,payload){
  if(APPS_SCRIPT_URL==='TU_URL_APPS_SCRIPT_AQUI')return;
  try{await fetch(APPS_SCRIPT_URL+'?action='+action,{method:'POST',body:JSON.stringify(payload)});}
  catch(e){console.warn('Sync error',e);}
}
async function syncData(){
  if(APPS_SCRIPT_URL==='TU_URL_APPS_SCRIPT_AQUI'){showToast('Configura la URL del Apps Script primero','error');return;}
  const btn=document.getElementById('sync-btn');
  btn.style.opacity='.5';btn.style.pointerEvents='none';
  await loadData();
  btn.style.opacity='';btn.style.pointerEvents='';
  showToast('Sincronizado correctamente','success');
}

// ── UTILS ─────────────────────────────────────────────────
function closeM(id){document.getElementById(id).classList.remove('open');}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',2600);
}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
loadData();
</script>
